name: Hourly Quote Trigger

on:
  schedule:
    - cron: '0 * * * *' # 每小時的 0 分觸發 (UTC)
  workflow_dispatch: # 允許在 GitHub 網頁手動點擊執行測試

jobs:
  ping-api:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Cron API
        run: |
          curl -X GET "https://daily-quote-bot-pun9.vercel.app/api/cron" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
